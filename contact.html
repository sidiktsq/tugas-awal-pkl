<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | My Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav>
        <div class="logo"><strong>DevPorto</strong></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="blog.html">Blog</a></li>
        </ul>
        <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌓</button>
    </nav>

    <main class="container">
        <header>
            <h1>Hubungi Kami</h1>
            <p>Punya proyek dalam pikiran atau hanya ingin menyapa?</p>
        </header>

        <form id="contact-form" class="contact-form">
            <div class="form-group">
                <label for="name">Nama Lengkap</label>
                <input type="text" id="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="How can I help you?" required></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Message</button>
        </form>

        <div id="display-area" class="submitted-data" style="display: none;">
            <h3>Message Sent!</h3>
            <p><strong>Name:</strong> <span id="res-name"></span></p>
            <p><strong>Email:</strong> <span id="res-email"></span></p>
            <p><strong>Message:</strong> <span id="res-msg"></span></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
